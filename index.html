<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OCR Scanner</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
    }
  </style>
</head>

<body class="text-white min-h-screen flex flex-col items-center">

  <!-- TOP UI -->
  <div class="w-full max-w-3xl mt-10 bg-white/10 backdrop-blur-xl rounded-2xl shadow-2xl p-6">

    <h1 class="text-2xl font-bold mb-4 text-center">
      📄 OCR Image Scanner
    </h1>

    <!-- Upload -->
    <div class="border-2 border-dashed border-gray-400 rounded-xl p-6 text-center">
      <input type="file" id="fileInput" class="hidden" accept="image/*">

      <label for="fileInput" class="cursor-pointer">
        <div class="text-gray-300">Click or drag an image here</div>
        <div class="text-sm text-gray-400 mt-1">PNG, JPG, JPEG supported</div>
      </label>
    </div>

    <!-- Button -->
    <button
      onclick="uploadImage()"
      class="mt-5 w-full bg-blue-600 hover:bg-blue-700 transition rounded-xl py-3 font-semibold"
    >
      🚀 Run OCR
    </button>

    <!-- Loading -->
    <div id="loading" class="hidden text-center mt-4 text-gray-300">
      Processing image...
    </div>

  </div>

  <!-- 📄 RESULT VIEWER -->
  <div id="viewer" class="hidden w-full mt-10 bg-white text-black px-10 py-8 shadow-inner">

    <div class="max-w-6xl mx-auto">
      <h2 class="text-xl font-bold mb-6 border-b pb-2">
        📄 OCR Result
      </h2>

      <!-- Injected HTML -->
      <div id="viewerContent"></div>
    </div>

  </div>

  <script>
    async function uploadImage() {
      const fileInput = document.getElementById("fileInput");
      const file = fileInput.files[0];

      if (!file) {
        alert("Please select an image first");
        return;
      }

      // ✅ CLEAR previous result
      document.getElementById("viewerContent").innerHTML = "";
      document.getElementById("viewer").classList.add("hidden");

      const formData = new FormData();
      formData.append("file", file);

      document.getElementById("loading").classList.remove("hidden");

      try {
        const response = await fetch("https://0a00-112-134-201-102.ngrok-free.app/ocr", {
          method: "POST",
          body: formData
        });

        const html = await response.text();

        // ✅ Insert new result
        document.getElementById("viewerContent").innerHTML = html;

        // ✅ Show viewer
        document.getElementById("viewer").classList.remove("hidden");

        // ✅ Scroll smoothly
        document.getElementById("viewer").scrollIntoView({
          behavior: "smooth"
        });

      } catch (error) {
        alert("Error calling OCR API");
        console.error(error);
      }

      document.getElementById("loading").classList.add("hidden");

      // ✅ Optional: reset file input
      fileInput.value = "";
    }
  </script>

</body>
</html>
